name: Chromatic hang hunt (natural)

# Tries to reproduce the original symptom naturally: `storybook build` hangs on
# its post-build telemetry POST and chromatic-cli kills it at its build-command
# timeout ("Command timed out after N milliseconds" / CLI_STORYBOOK_BUILD_FAILED).
#
# No blackhole — this just runs chromatic --dry-run against the real telemetry
# endpoint in a loop and samples across a few parallel shards, hoping to catch a
# stalled connection like the one seen in prod. A shard goes RED when it catches
# a hang; all-green means nothing reproduced this run (expected when the endpoint
# is healthy).

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false # let every shard finish sampling
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # chromatic's git phase wants full history

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - run: npm ci

      - name: Loop chromatic --dry-run
        env:
          # Drop chromatic's build timeout from 600s so a hang fails fast; a
          # healthy build takes ~10s. Bump to 600000 for the verbatim
          # "Command timed out after 600000 milliseconds".
          STORYBOOK_BUILD_TIMEOUT: "120000"
        run: |
          for i in $(seq 1 10); do
            echo "::group::shard ${{ matrix.shard }} attempt $i"
            start=$(date +%s)
            npm run chromatic -- --dry-run
            echo "attempt $i ok in $(( $(date +%s) - start ))s"
            echo "::endgroup::"
          done
          echo "no hang in 10 attempts on shard ${{ matrix.shard }}"
