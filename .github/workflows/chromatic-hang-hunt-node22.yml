name: Chromatic hang hunt (natural, Node 22)

# Identical to "Chromatic hang hunt (natural)" but on Node 22, to compare
# whether the telemetry build-hang reproduces less often on an older Node than
# on Node 26 (newer Node stream-lifecycle changes are suspected to make the
# hang-instead-of-exit behaviour more likely).

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false # let every shard finish sampling
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # chromatic's git phase wants full history

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Loop chromatic --dry-run
        env:
          # Set this repo secret: gh secret set CHROMATIC_PROJECT_TOKEN
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # Drop chromatic's build timeout from 600s so a hang fails fast; a
          # healthy build takes ~10s. Bump to 600000 for the verbatim
          # "Command timed out after 600000 milliseconds".
          STORYBOOK_BUILD_TIMEOUT: "120000"
        run: |
          for i in $(seq 1 10); do
            echo "::group::shard ${{ matrix.shard }} attempt $i"
            start=$(date +%s)
            npx chromatic --dry-run
            echo "attempt $i ok in $(( $(date +%s) - start ))s"
            echo "::endgroup::"
          done
          echo "no hang in 10 attempts on shard ${{ matrix.shard }}"
